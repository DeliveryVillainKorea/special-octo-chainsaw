services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sokmaeum
      POSTGRES_PASSWORD: sokmaeum
      POSTGRES_DB: sokmaeum
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
# 사용 시: DATABASE_URL=postgresql+psycopg2://sokmaeum:sokmaeum@localhost:5432/sokmaeum
